<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Les Jardins d'Or Val</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #3A7D44; --green-light: #5A9E64; --gold: #C9A84C;
      --dark: #1A1F1B; --dark2: #222820; --dark3: #2A3028;
      --beige: #F7F2EA; --beige3: #D9D0C0; --white: #fff;
      --muted: #7A8C7B; --radius: 4px;
    }
    body { font-family: 'Outfit', sans-serif; background: var(--dark); color: #e8f0e9; min-height: 100vh; }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box { background: var(--dark2); border: 1px solid rgba(201,168,76,0.2); border-radius: var(--radius); padding: 3rem; width: 100%; max-width: 400px; text-align: center; }
    .login-box h1 { font-family: 'Outfit', sans-serif; font-size: 1.1rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
    .login-box p { font-size: 0.85rem; color: var(--muted); margin-bottom: 2rem; }
    .login-box input { width: 100%; background: var(--dark3); border: 1px solid rgba(255,255,255,0.1); color: var(--white); padding: 0.9rem 1rem; font-family: 'Outfit', sans-serif; font-size: 1rem; border-radius: var(--radius); outline: none; margin-bottom: 1rem; }
    .login-box input:focus { border-color: var(--gold); }
    .login-box button { width: 100%; background: var(--gold); color: var(--dark); padding: 0.9rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border: none; border-radius: var(--radius); font-family: 'Outfit', sans-serif; font-size: 0.85rem; transition: background 0.2s; }
    .login-box button:hover { background: #e2c97e; }
    .login-error { color: #e74c3c; font-size: 0.85rem; margin-top: 0.5rem; display: none; }

    /* ADMIN */
    .admin-wrap { display: none; max-width: 1100px; margin: 0 auto; padding: 2rem; }
    .admin-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid rgba(201,168,76,0.15); }
    .admin-header h1 { font-size: 1rem; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
    .logout-btn { background: transparent; border: 1px solid rgba(255,255,255,0.15); color: var(--muted); padding: 0.4rem 1rem; cursor: pointer; border-radius: var(--radius); font-family: 'Outfit', sans-serif; font-size: 0.78rem; transition: all 0.2s; }
    .logout-btn:hover { border-color: #e74c3c; color: #e74c3c; }

    /* TABS */
    .admin-tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; border-bottom: 1px solid rgba(255,255,255,0.08); }
    .admin-tab { padding: 0.8rem 1.5rem; background: transparent; border: none; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 0.82rem; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; margin-bottom: -1px; }
    .admin-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }

    /* UPLOAD FORM */
    .upload-form { background: var(--dark2); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 2rem; margin-bottom: 2rem; }
    .form-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .field { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1rem; }
    .field label { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
    .field input, .field select, .field textarea { background: var(--dark3); border: 1px solid rgba(255,255,255,0.08); color: var(--white); padding: 0.8rem 1rem; font-family: 'Outfit', sans-serif; font-size: 0.9rem; border-radius: var(--radius); outline: none; transition: border-color 0.2s; }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gold); }
    .field select option { background: var(--dark2); }

    /* DROP ZONE */
    .dropzone { border: 2px dashed rgba(201,168,76,0.25); border-radius: var(--radius); padding: 2.5rem; text-align: center; cursor: pointer; transition: all 0.25s; position: relative; }
    .dropzone:hover, .dropzone.drag-over { border-color: var(--gold); background: rgba(201,168,76,0.04); }
    .dropzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dropzone-icon { font-size: 2rem; margin-bottom: 0.8rem; display: block; }
    .dropzone p { font-size: 0.88rem; color: var(--muted); }
    .dropzone p span { color: var(--gold); }
    .preview-grid-admin { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 0.6rem; margin-top: 1rem; }
    .preview-item-admin { position: relative; aspect-ratio: 1/1; border-radius: 2px; overflow: hidden; }
    .preview-item-admin img { width: 100%; height: 100%; object-fit: cover; }
    .preview-item-admin button { position: absolute; top: 2px; right: 2px; background: rgba(231,76,60,0.9); border: none; color: white; width: 20px; height: 20px; border-radius: 50%; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }

    .btn-upload { background: var(--green); color: white; border: none; padding: 1rem 2.5rem; font-family: 'Outfit', sans-serif; font-size: 0.85rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; border-radius: var(--radius); transition: background 0.2s; margin-top: 1rem; }
    .btn-upload:hover { background: var(--green-light); }
    .btn-upload:disabled { background: var(--muted); cursor: not-allowed; }

    .status-bar { padding: 0.8rem 1rem; border-radius: var(--radius); font-size: 0.85rem; margin-top: 1rem; display: none; }
    .status-bar.success { background: rgba(58,125,68,0.15); border: 1px solid rgba(58,125,68,0.3); color: #6fcf97; }
    .status-bar.error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); color: #e74c3c; }
    .status-bar.info { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); color: var(--gold); }

    /* PROGRESS */
    .progress-bar { width: 100%; height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 0.8rem; overflow: hidden; display: none; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.3s; width: 0; }

    /* GALERIE ADMIN */
    .gallery-cats { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    .tab-btn { padding: 0.45rem 1.2rem; border: 1px solid rgba(255,255,255,0.1); background: transparent; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 0.78rem; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; border-radius: 100px; transition: all 0.2s; }
    .tab-btn.active { background: var(--gold); border-color: var(--gold); color: var(--dark); }
    .admin-gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
    .admin-photo { position: relative; aspect-ratio: 4/3; border-radius: var(--radius); overflow: hidden; }
    .admin-photo img { width: 100%; height: 100%; object-fit: cover; }
    .admin-photo-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; opacity: 0; transition: opacity 0.25s; padding: 0.5rem; }
    .admin-photo:hover .admin-photo-overlay { opacity: 1; }
    .admin-photo-cat { font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
    .admin-photo-title { font-size: 0.8rem; color: white; text-align: center; }
    .btn-delete { background: #e74c3c; border: none; color: white; padding: 0.4rem 0.8rem; font-size: 0.72rem; border-radius: 2px; cursor: pointer; font-family: 'Outfit', sans-serif; letter-spacing: 1px; }
    .btn-delete:hover { background: #c0392b; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <h1>🌿 Admin</h1>
    <p>Les Jardins d'Or Val — Gestion des photos</p>
    <input type="password" id="passwordInput" placeholder="Mot de passe" onkeydown="if(event.key==='Enter')checkLogin()" />
    <button onclick="checkLogin()">Accéder →</button>
    <div class="login-error" id="loginError">Mot de passe incorrect.</div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-wrap" id="adminWrap">
  <div class="admin-header">
    <h1>🌿 Les Jardins d'Or Val — Admin Photos</h1>
    <button class="logout-btn" onclick="logout()">Déconnexion</button>
  </div>

  <div class="admin-tabs">
    <button class="admin-tab active" onclick="switchTab('upload', this)">📤 Ajouter des photos</button>
    <button class="admin-tab" onclick="switchTab('gallery', this)">🖼️ Gérer la galerie</button>
  </div>

  <!-- UPLOAD -->
  <div class="admin-panel active" id="panel-upload">
    <div class="upload-form">
      <div class="form-row-2">
        <div class="field">
          <label>Catégorie *</label>
          <select id="photo-cat">
            <option value="">— Choisir —</option>
            <option value="creation">🌿 Création</option>
            <option value="terrassement">🚜 Terrassement</option>
            <option value="entretien">✂️ Entretien</option>
            <option value="elagage">🌳 Élagage</option>
            <option value="clotures">🔒 Clôtures</option>
            <option value="amenagement">🪨 Aménagement</option>
          </select>
        </div>
        <div class="field">
          <label>Titre / Légende</label>
          <input type="text" id="photo-title" placeholder="ex. Création jardin Manosque" />
        </div>
      </div>
      <div class="field">
        <label>Description courte (optionnel)</label>
        <input type="text" id="photo-desc" placeholder="ex. Création complète avec terrassement et plantation" />
      </div>

      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput" multiple accept="image/*" />
        <span class="dropzone-icon">🖼️</span>
        <p>Glissez vos photos ici ou <span>cliquez pour sélectionner</span></p>
        <p style="font-size:0.75rem;margin-top:0.5rem;opacity:0.5">JPG, PNG, WEBP — Plusieurs photos possibles</p>
      </div>
      <div class="preview-grid-admin" id="previewGrid"></div>

      <div class="progress-bar" id="progressBar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="status-bar" id="statusBar"></div>

      <button class="btn-upload" id="uploadBtn" onclick="uploadPhotos()">⬆ Publier sur le site</button>
    </div>
  </div>

  <!-- GALLERY -->
  <div class="admin-panel" id="panel-gallery">
    <div class="gallery-cats">
      <button class="tab-btn active" onclick="loadGallery('creation', this)">🌿 Création</button>
      <button class="tab-btn" onclick="loadGallery('terrassement', this)">🚜 Terrassement</button>
      <button class="tab-btn" onclick="loadGallery('entretien', this)">✂️ Entretien</button>
      <button class="tab-btn" onclick="loadGallery('elagage', this)">🌳 Élagage</button>
      <button class="tab-btn" onclick="loadGallery('clotures', this)">🔒 Clôtures</button>
      <button class="tab-btn" onclick="loadGallery('amenagement', this)">🪨 Aménagement</button>
    </div>
    <div class="admin-gallery-grid" id="adminGallery">
      <p style="color:var(--muted);font-size:0.85rem;">Sélectionnez une catégorie pour voir les photos.</p>
    </div>
  </div>
</div>

<script>
/* ── CONFIG ── */
const CONFIG = {
  password:    'jardins2025',      // ← change le mot de passe !
  cloudName:   'TON_CLOUD_NAME',   // ← ton cloud name Cloudinary
  uploadPreset:'jardins_upload',   // ← ton upload preset Cloudinary
};

const CATS = {
  creation:     { icon: '🌿', label: 'Création' },
  terrassement: { icon: '🚜', label: 'Terrassement' },
  entretien:    { icon: '✂️', label: 'Entretien' },
  elagage:      { icon: '🌳', label: 'Élagage' },
  clotures:     { icon: '🔒', label: 'Clôtures' },
  amenagement:  { icon: '🪨', label: 'Aménagement' },
};

/* ── AUTH ── */
function checkLogin() {
  const pwd = document.getElementById('passwordInput').value;
  if (pwd === CONFIG.password) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminWrap').style.display = 'block';
    loadGallery('creation', document.querySelector('.tab-btn'));
  } else {
    document.getElementById('loginError').style.display = 'block';
  }
}
function logout() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminWrap').style.display = 'none';
  document.getElementById('passwordInput').value = '';
}

/* ── TABS ── */
function switchTab(tab, btn) {
  document.querySelectorAll('.admin-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
}

/* ── DROPZONE ── */
let selectedFiles = [];
const fileInput   = document.getElementById('fileInput');
const previewGrid = document.getElementById('previewGrid');
const dropzone    = document.getElementById('dropzone');

fileInput.addEventListener('change', () => addFiles(fileInput.files));
dropzone.addEventListener('dragover',  e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault(); dropzone.classList.remove('drag-over');
  addFiles(e.dataTransfer.files);
});

function addFiles(files) {
  Array.from(files).forEach(f => {
    if (!f.type.startsWith('image/')) return;
    selectedFiles.push(f);
    const div = document.createElement('div'); div.className = 'preview-item-admin';
    const img = document.createElement('img'); img.src = URL.createObjectURL(f);
    const btn = document.createElement('button'); btn.textContent = '×';
    const idx = selectedFiles.length - 1;
    btn.onclick = () => { selectedFiles.splice(idx, 1); div.remove(); };
    div.appendChild(img); div.appendChild(btn);
    previewGrid.appendChild(div);
  });
}

/* ── UPLOAD ── */
function setStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.textContent = msg; bar.className = 'status-bar ' + type; bar.style.display = 'block';
}

async function uploadPhotos() {
  const cat   = document.getElementById('photo-cat').value;
  const title = document.getElementById('photo-title').value.trim();
  const desc  = document.getElementById('photo-desc').value.trim();
  if (!cat)               return setStatus('⚠️ Choisis une catégorie.', 'error');
  if (!selectedFiles.length) return setStatus('⚠️ Ajoute au moins une photo.', 'error');

  const btn  = document.getElementById('uploadBtn');
  const prog = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  btn.disabled = true; prog.style.display = 'block';

  let done = 0;
  for (const file of selectedFiles) {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('upload_preset', CONFIG.uploadPreset);
    fd.append('tags', [cat, 'jardins-or-val'].join(','));
    if (title) fd.append('context', 'caption=' + title + (desc ? '|alt=' + desc : ''));

    try {
      setStatus(`⬆ Upload ${done + 1}/${selectedFiles.length}...`, 'info');
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.cloudName}/image/upload`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error('Erreur upload');
      done++;
      fill.style.width = (done / selectedFiles.length * 100) + '%';
    } catch(e) {
      setStatus('❌ Erreur sur une photo. Réessayez.', 'error');
      btn.disabled = false; return;
    }
  }

  setStatus(`✅ ${done} photo(s) publiée(s) sur le site !`, 'success');
  selectedFiles = []; previewGrid.innerHTML = '';
  document.getElementById('photo-title').value = '';
  document.getElementById('photo-desc').value = '';
  document.getElementById('photo-cat').value = '';
  btn.disabled = false;
  setTimeout(() => { prog.style.display = 'none'; fill.style.width = '0'; }, 2000);
}

/* ── GALERIE ADMIN ── */
async function loadGallery(cat, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const grid = document.getElementById('adminGallery');
  grid.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">Chargement…</p>';
  try {
    const res  = await fetch(`https://res.cloudinary.com/${CONFIG.cloudName}/image/list/${cat}.json`);
    const data = await res.json();
    const imgs = data.resources || [];
    if (!imgs.length) { grid.innerHTML = '<p style="color:var(--muted);font-size:0.85rem;">Aucune photo dans cette catégorie.</p>'; return; }
    grid.innerHTML = '';
    imgs.forEach(img => {
      const url     = `https://res.cloudinary.com/${CONFIG.cloudName}/image/upload/w_400,c_fill,q_auto/${img.public_id}.jpg`;
      const caption = (img.context && img.context.custom && img.context.custom.caption) ? img.context.custom.caption : '';
      const div = document.createElement('div'); div.className = 'admin-photo';
      div.innerHTML = `
        <img src="${url}" alt="${caption}" loading="lazy" />
        <div class="admin-photo-overlay">
          <div class="admin-photo-cat">${CATS[cat]?.icon || ''} ${CATS[cat]?.label || cat}</div>
          ${caption ? `<div class="admin-photo-title">${caption}</div>` : ''}
          <button class="btn-delete" onclick="deletePhoto('${img.public_id}', '${cat}')">🗑 Supprimer</button>
        </div>`;
      grid.appendChild(div);
    });
  } catch(e) {
    grid.innerHTML = '<p style="color:#e74c3c;font-size:0.85rem;">Impossible de charger les photos.</p>';
  }
}

function deletePhoto(publicId, cat) {
  if (!confirm('Supprimer cette photo ? Cette action est irréversible.')) return;
  alert('Pour supprimer une photo, rendez-vous directement dans la médiathèque Cloudinary.\nID : ' + publicId);
}
</script>
</body>
</html>
